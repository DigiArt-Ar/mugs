<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      :root { --rosa-digiart: #ff69b4; --branco: #ffffff; --detalhe-ar: #fff0f5; }
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; }
      
      .interface {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; z-index: 9999; text-align: center;
        padding: 20px; box-sizing: border-box; backdrop-filter: blur(12px);
        color: var(--branco); background: rgba(255, 105, 180, 0.9);
      }

      .marca { font-size: 42px; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
      .marca span { color: var(--detalhe-ar); }
      .subtitulo { font-size: 16px; opacity: 0.9; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; }

      .btn {
        padding: 18px 40px; border-radius: 50px; border: 2px solid var(--branco);
        background: var(--branco); color: #ff1493;
        font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        text-decoration: none; display: inline-block;
      }
      .btn:active { transform: scale(0.95); background: transparent; color: white; }
      
      p { font-size: 18px; line-height: 1.4; max-width: 300px; margin-bottom: 25px; }
      .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>

    <div id="tela-tutorial" class="interface">
      <div style="font-size: 50px; margin-bottom: 10px;">💖</div>
      <div class="marca">DigiArt <span>AR</span></div>
      <div class="subtitulo">Edição Especial Dual</div>
      <p>Uma surpresa especial espera por você. Toque abaixo para iniciar.</p>
      <button class="btn" onclick="iniciarMagia()">ABRIR PRESENTE ✨</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" vr-mode-ui="enabled: false">
      <a-assets>
        <video id="vid1" src="1.mp4" loop="true" playsinline autoplay muted crossorigin="anonymous"></video>
        <video id="vid2" src="2.mp4" loop="true" playsinline autoplay muted crossorigin="anonymous"></video>
      </a-assets>
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid1" position="0 0 0" width="1" height="1.77" scale="1.5 1.5 1.5"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-video src="#vid2" position="0 0 0" width="1" height="1.77" scale="1.5 1.5 1.5"></a-video>
      </a-entity>
    </a-scene>

    <script>
      function iniciarMagia() {
        document.getElementById('tela-tutorial').style.display = 'none';
        document.querySelector('a-scene').systems["mindar-image-system"].start();
        
        const v1 = document.querySelector('#vid1');
        const v2 = document.querySelector('#vid2');
        
        // Dispara o vídeo quando o alvo for encontrado
        document.querySelectorAll("a-entity[mindar-image-target]").forEach((target, index) => {
          target.addEventListener("targetFound", () => {
            const video = index === 0 ? v1 : v2;
            video.play();
          });
          target.addEventListener("targetLost", () => {
            const video = index === 0 ? v1 : v2;
            video.pause();
          });
        });
      }
    </script>
  </body>
</html>
